name: CodeRev Weekly Audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  weekly-audit:
    name: Weekly Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "GROQ_API_KEY secret is not configured"
            echo "Go to Settings -> Secrets -> Actions and add GROQ_API_KEY"
            exit 1
          fi
          echo "Required secrets verified"

      - name: Generate full codebase diff
        run: |
          WEEK_AGO=$(git log --before="7 days ago" --format="%H" -n 1)
          if [ -z "$WEEK_AGO" ]; then
            git diff --diff-filter=A HEAD > weekly.patch
          else
            git diff ${WEEK_AGO}...HEAD > weekly.patch
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install CodeRev
        run: pip install -e .

      - name: Run weekly audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          coderev review \
            --diff weekly.patch \
            --format json \
            --output weekly_review.json \
            --no-cache \
            --min-confidence 0.6

      - name: Create GitHub issue for critical findings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('weekly_review.json', 'utf8'));
            const criticals = (result.findings || []).filter(f => f.severity === 'critical');

            if (criticals.length === 0) {
              console.log('No critical findings — skipping issue creation');
              return;
            }

            const body = [
              `## 🔴 Weekly CodeRev Audit — ${criticals.length} Critical Finding(s)`,
              ``,
              `**Date:** ${new Date().toISOString().split('T')[0]}`,
              `**Overall Risk:** ${result.overall_risk?.toUpperCase()}`,
              ``,
              `### Critical Issues`,
              ...criticals.map(f =>
                `- **${f.title}** — \`${f.file_path}\` L${f.line_range?.start || '?'}\n  ${f.description}`
              ),
              ``,
              `_Automatically generated by CodeRev weekly audit_`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 CodeRev Weekly Audit: ${criticals.length} Critical Issue(s) Found`,
              body,
              labels: ['security', 'automated'],
            });

      - name: Save weekly artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-audit-${{ github.run_id }}
          path: weekly_review.json
          retention-days: 90
